<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mockup 4 — Mapa de Constelaciones</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#020a14;color:#f1f5f9;font-family:'Rubik',sans-serif;min-height:100vh;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:16px;padding:20px 40px;border-bottom:1px solid #0f2035}
  header h1{font-size:1.3rem;font-weight:700;color:#f1f5f9}
  header p{color:#94a3b8;font-size:.88rem;margin-top:2px}
  .badge{display:inline-flex;align-items:center;justify-content:center;min-width:38px;height:28px;padding:0 10px;border-radius:8px;font-size:.72rem;font-weight:700;letter-spacing:.5px;background:rgba(167,139,250,.15);color:#a78bfa;border:1px solid #8b5cf6}
  .back{color:#60a5fa;text-decoration:none;font-size:.85rem;margin-left:auto;display:flex;align-items:center;gap:5px}
  .back:hover{color:#93c5fd}
  svg{width:100%;height:auto;display:block}
  @keyframes twinkle{0%,100%{opacity:1}50%{opacity:.45}}
  footer{text-align:center;padding:16px;color:#334155;font-size:.78rem;border-top:1px solid #0f2035;margin-top:auto}
</style>
</head>
<body>
<header>
  <span class="badge">O4</span>
  <div><h1>Mapa de Constelaciones</h1><p>Propuesta 4 de 5 — Espiral Home Student</p></div>
  <a class="back" href="index.html">← Volver al índice</a>
</header>

<div id="svgWrap"></div>

<footer>Robotix Educational Platform · Mockup 4 · Mapa de Constelaciones</footer>

<script>
const UNITS = [
  { name:'Onboarding', short:'MC', status:'completed', pct:100 },
  { name:'Plataforma', short:'U0', status:'completed', pct:100 },
  { name:'Lanzamiento', short:'U1', status:'completed', pct:100 },
  { name:'Preparado', short:'U2', status:'in-progress', pct:60 },
  { name:'Visión Túnel', short:'U3', status:'locked', pct:0 },
  { name:'Señales', short:'U4', status:'locked', pct:0 },
  { name:'Respuesta', short:'U5', status:'locked', pct:0 },
  { name:'Demo Day', short:'U6', status:'locked', pct:0 },
];
const ACTS = ['Preparación','Protocolo','Entrega','DemoDay','Continuar'];

const STATUS = {
  completed:{ ring:'#4ade80', fill:'#14532d', glow:'#22c55e', text:'#86efac' },
  'in-progress':{ ring:'#60a5fa', fill:'#1e3a5f', glow:'#3b82f6', text:'#93c5fd' },
  locked:{ ring:'#334155', fill:'#1a2035', glow:null, text:'#64748b' },
};

const rng = s => () => { s = Math.imul(s ^ s>>>15, 1 | s); s ^= s << 7; return ((s ^ s>>>14) >>> 0) / 2**32; };
const rand = rng(314);

const W=1000, H=680;
const E=(t,a,p)=>{const e=document.createElementNS('http://www.w3.org/2000/svg',t);Object.entries(a||{}).forEach(([k,v])=>e.setAttribute(k,v));p?.appendChild(e);return e;};
const T=(txt,a,p)=>{const e=E('text',a,p);e.textContent=txt;return e;};

const svg=E('svg',{viewBox:`0 0 ${W} ${H}`,xmlns:'http://www.w3.org/2000/svg'});
svg.style.cssText='width:100%;height:auto;display:block';
const defs=E('defs',{},svg);

// Background gradient
const bgGrad=E('radialGradient',{id:'bgGrad',cx:'50%',cy:'50%',r:'70%'},defs);
E('stop',{offset:'0%','stop-color':'#05111f'},bgGrad);
E('stop',{offset:'100%','stop-color':'#020a14'},bgGrad);
E('rect',{width:W,height:H,fill:'url(#bgGrad)'},svg);

// Background stars (250)
const twinkleTimes=['2.1s','3.4s','1.8s','4.2s','2.9s'];
for(let i=0;i<250;i++){
  const x=rand()*W, y=rand()*H, r=rand()*1.4+0.2;
  const opacity=(rand()*0.45+0.06).toFixed(2);
  const st=E('circle',{cx:x,cy:y,r,fill:`rgba(241,245,249,${opacity})`},svg);
  if(rand()>0.7){
    st.style.animation=`twinkle ${twinkleTimes[Math.floor(rand()*5)]} ease-in-out infinite`;
    st.style.animationDelay=`${(rand()*4).toFixed(1)}s`;
  }
}

// Title
T('Mapa de Constelaciones · Campo estelar del programa C450',{x:W/2,y:22,'text-anchor':'middle','dominant-baseline':'middle',fill:'#94a3b8','font-size':'13','font-family':'Rubik'},svg);

// Unit star positions
const STAR_POS=[
  [170,280],[320,140],[500,220],[680,160],
  [240,440],[430,500],[640,420],[830,310]
];

// Activity offsets per unit (angle in deg, distance)
const ACT_OFFSETS=[
  [[-80,55],[-30,60],[20,55],[70,60],[120,50]],
  [[-110,55],[-55,58],[5,55],[65,58],[125,50]],
  [[-95,55],[-40,58],[15,52],[70,58],[125,52]],
  [[-70,55],[-20,60],[30,55],[80,60],[135,52]],
  [[-100,55],[-45,58],[10,54],[68,60],[130,50]],
  [[-85,55],[-30,58],[25,54],[80,60],[135,52]],
  [[-95,55],[-40,58],[15,52],[70,58],[130,52]],
  [[-80,55],[-25,60],[30,55],[85,60],[140,50]],
];

function getActStatuses(unit){
  if(unit.status==='completed') return ACTS.map(()=>'completed');
  if(unit.status==='locked') return ACTS.map(()=>'locked');
  return ['completed','completed','completed','in-progress','locked'];
}

// Progression path (dashed line connecting unit stars in sequence)
const progD=STAR_POS.map((p,i)=>`${i===0?'M':'L'}${p[0]},${p[1]}`).join(' ');
E('path',{d:progD,fill:'none',stroke:'rgba(241,245,249,0.07)','stroke-width':1.2,'stroke-dasharray':'5 8','stroke-linecap':'round'},svg);

// Nebula clouds for flavor
[[300,300,120],[700,390,100],[150,520,90]].forEach(([nx,ny,nr])=>{
  const ng=E('radialGradient',{id:`neb${nx}`,cx:'50%',cy:'50%',r:'50%'},defs);
  E('stop',{offset:'0%','stop-color':'#1e3a5f','stop-opacity':'0.18'},ng);
  E('stop',{offset:'100%','stop-color':'#020a14','stop-opacity':'0'},ng);
  E('ellipse',{cx:nx,cy:ny,rx:nr,ry:nr*0.6,fill:`url(#neb${nx})`},svg);
});

// Draw constellations per unit
UNITS.forEach((u,i)=>{
  const [ux,uy]=STAR_POS[i];
  const sc=STATUS[u.status];
  const actSts=getActStatuses(u);
  const offsets=ACT_OFFSETS[i];

  // Compute activity star positions
  const actPos=offsets.map(([deg,dist])=>{
    const rad=deg*Math.PI/180;
    return [ux+dist*Math.cos(rad), uy+dist*Math.sin(rad)];
  });

  // Constellation lines: unit → each activity
  actPos.forEach(([ax,ay],j)=>{
    const ast=actSts[j];
    const ac=STATUS[ast];
    const lCol=ast==='locked'?'rgba(51,65,85,0.3)':ast==='in-progress'?'rgba(96,165,250,0.35)':'rgba(74,222,128,0.3)';
    E('line',{x1:ux,y1:uy,x2:ax,y2:ay,stroke:lCol,'stroke-width':1,'stroke-dasharray':ast==='locked'?'3 5':'none'},svg);
  });

  // Activity stars
  actPos.forEach(([ax,ay],j)=>{
    const ast=actSts[j];
    const ac=STATUS[ast];
    const ar=ast==='in-progress'?7:ast==='completed'?5.5:4;
    if(ac.glow) E('circle',{cx:ax,cy:ay,r:ar+7,fill:`${ac.glow}18`},svg);
    E('circle',{cx:ax,cy:ay,r:ar,fill:ac.fill,stroke:ac.ring,'stroke-width':1.2},svg);
    if(ast==='completed') E('circle',{cx:ax,cy:ay,r:2,fill:ac.ring,'opacity':'.8'},svg);
    // Activity label (very small)
    T(ACTS[j].slice(0,4),{x:ax,y:ay-ar-5,'text-anchor':'middle',fill:ac.text,'font-size':'7.5','font-family':'Rubik','opacity':'.8'},svg);
  });

  // Unit star
  const ur=u.status==='in-progress'?18:u.status==='completed'?14:11;

  // Glow layers
  if(sc.glow){
    E('circle',{cx:ux,cy:uy,r:ur+20,fill:`${sc.glow}0c`},svg);
    E('circle',{cx:ux,cy:uy,r:ur+10,fill:`${sc.glow}18`},svg);
  }

  const starGrad=E('radialGradient',{id:`starG${i}`,cx:'38%',cy:'32%',r:'65%'},defs);
  E('stop',{offset:'0%','stop-color':sc.glow||sc.ring,'stop-opacity':'.7'},starGrad);
  E('stop',{offset:'100%','stop-color':sc.fill},starGrad);
  E('circle',{cx:ux,cy:uy,r:ur,fill:`url(#starG${i})`,stroke:sc.ring,'stroke-width':u.status==='in-progress'?2.5:1.8},svg);

  // Cross/sparkle for completed stars
  if(u.status==='completed'){
    const sp=ur*0.55;
    [0,90].forEach(deg=>{
      const rad=deg*Math.PI/180;
      E('line',{
        x1:ux+Math.cos(rad)*(-sp),y1:uy+Math.sin(rad)*(-sp),
        x2:ux+Math.cos(rad)*sp,y2:uy+Math.sin(rad)*sp,
        stroke:'#86efac','stroke-width':1,'opacity':'.6'
      },svg);
    });
    [45,135].forEach(deg=>{
      const rad=deg*Math.PI/180;
      E('line',{
        x1:ux+Math.cos(rad)*(-sp*0.6),y1:uy+Math.sin(rad)*(-sp*0.6),
        x2:ux+Math.cos(rad)*(sp*0.6),y2:uy+Math.sin(rad)*(sp*0.6),
        stroke:'#86efac','stroke-width':.8,'opacity':'.4'
      },svg);
    });
  }

  T(u.short,{x:ux,y:uy,'text-anchor':'middle','dominant-baseline':'middle',fill:sc.text,'font-size':ur>12?'9':'8','font-weight':'700','font-family':'Rubik'},svg);

  // Unit name label
  const labelOffset=i%2===0?ur+17:-(ur+7);
  T(u.name,{x:ux,y:uy+labelOffset,'text-anchor':'middle',fill:sc.text,'font-size':'10.5','font-weight':'600','font-family':'Rubik'},svg);
});

// Progress bar for in-progress unit
const ipIdx=3;
const [ipx,ipy]=STAR_POS[ipIdx];
const barW=60, barH=6, barX=ipx-barW/2, barY=ipy+28;
E('rect',{x:barX,y:barY,width:barW,height:barH,rx:3,fill:'#1e3a5f',stroke:'#3b82f6','stroke-width':.8},svg);
E('rect',{x:barX,y:barY,width:barW*0.6,height:barH,rx:3,fill:'#3b82f6'},svg);
T('60%',{x:ipx,y:barY+barH+10,'text-anchor':'middle',fill:'#93c5fd','font-size':'8','font-family':'Rubik'},svg);

// Legend
const legendY=H-30;
const legendItems=[
  {label:'Completado',color:'#4ade80',fill:'#14532d'},
  {label:'En curso',color:'#60a5fa',fill:'#1e3a5f'},
  {label:'Bloqueado',color:'#334155',fill:'#1a2035'},
];
legendItems.forEach((li,i)=>{
  const lx=W/2-120+i*120;
  E('circle',{cx:lx,cy:legendY,r:7,fill:li.fill,stroke:li.color,'stroke-width':1.5},svg);
  T(li.label,{x:lx+13,y:legendY,'dominant-baseline':'middle',fill:'#94a3b8','font-size':'10','font-family':'Rubik'},svg);
});

document.getElementById('svgWrap').appendChild(svg);
</script>
</body>
</html>
